services:
  postgres:
    image: postgres:16
    container_name: logimarket_postgres
    environment:
      POSTGRES_DB: logimarket
      POSTGRES_USER: logimarket
      POSTGRES_PASSWORD: logimarket123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
      - ./data:/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logimarket -d logimarket"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7
    container_name: logimarket_mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./mongodb/import:/import

  neo4j:
    image: neo4j:5
    container_name: logimarket_neo4j
    environment:
      NEO4J_AUTH: neo4j/logimarket123
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - ./neo4j/import:/var/lib/neo4j/import

  redis:
    image: redis:7
    container_name: logimarket_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  metabase:
    image: metabase/metabase:latest
    container_name: logimarket_metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase_db
      MB_DB_PORT: 5432
      MB_DB_USER: logimarket
      MB_DB_PASS: logimarket123
      MB_DB_HOST: postgres
    volumes:
      - metabase_data:/metabase-data
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  mongo_data:
  neo4j_data:
  redis_data:
  metabase_data: